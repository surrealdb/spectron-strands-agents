name: Release

# Publish spectron-strands-agents to PyPI when a v* tag is pushed.
on:
  push:
    tags: ["v*"]

# Least privilege by default; the publish job opts into id-token below.
permissions:
  contents: read

jobs:
  build:
    name: build wheel and sdist
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Build distributions
        run: |
          python -m pip install build
          python -m build

      - name: Check package metadata
        run: |
          python -m pip install twine
          python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/
          if-no-files-found: error

  publish:
    name: publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # OIDC token for Trusted Publishing — no stored secrets.
    permissions:
      id-token: write
    # Gate releases behind an environment (add reviewers / tag rules in repo settings).
    environment:
      name: release
      url: https://pypi.org/project/spectron-strands-agents/
    steps:
      - name: Download distributions
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
